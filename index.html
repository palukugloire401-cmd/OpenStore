<!DOCTYPE html>
<html lang="fr">
<head>
    <meta name="google-site-verification" content="YJ0QvJF241nyGAr09AQY-4mInNn2P30ufbbQ5The19E" />
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenStore</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:Arial,sans-serif;background:#070a13;color:#e0e0e0;min-height:100vh}
        .header{background:#111827;padding:15px 30px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #1f2937}
        .logo{color:white;font-size:22px;font-weight:bold}
        .logo i{color:#00e676}
        button{background:#00e676;color:#000;border:none;padding:12px 24px;border-radius:50px;font-size:16px;font-weight:bold;cursor:pointer}
        button:hover{background:#00ff84}
        .container{max-width:1000px;margin:0 auto;padding:30px;text-align:center}
        h1{font-size:36px;margin-bottom:20px;background:linear-gradient(135deg,#00e676,#00ff84);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
        p{color:#9ca3af;margin-bottom:30px;font-size:18px}
        .modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.85);z-index:999;justify-content:center;align-items:center}
        .modal.show{display:flex}
        .modal-box{background:#111827;padding:30px;border-radius:16px;width:90%;max-width:500px;border:1px solid #1f2937}
        .modal-box h2{color:white;margin-bottom:20px}
        .modal-box input,.modal-box textarea{width:100%;padding:10px;margin-bottom:15px;background:#070a13;border:1px solid #1f2937;border-radius:10px;color:white;font-size:14px}
        .modal-box textarea{min-height:80px;resize:vertical}
        .upload-area{border:2px dashed #1f2937;padding:30px;text-align:center;border-radius:10px;margin-bottom:15px;cursor:pointer;background:#070a13}
        .upload-area:hover{border-color:#00e676}
        .upload-area i{font-size:30px;color:#00e676}
        .modal-buttons{display:flex;gap:10px;justify-content:flex-end}
        .btn-cancel{background:transparent;border:1px solid #1f2937;color:#9ca3af}
        .toast{position:fixed;top:20px;right:20px;background:#111827;border-left:3px solid #00e676;padding:15px 20px;border-radius:10px;z-index:9999}
        .footer{text-align:center;padding:20px;color:#6b7280;border-top:1px solid #1f2937;margin-top:50px}
    </style>
</head>
<body>

    <div class="header">
        <a href="/" class="logo"><i class="fab fa-android"></i> OpenStore</a>
        <button onclick="ouvrirModal()"><i class="fas fa-plus"></i> Publier un APK</button>
    </div>

    <div class="container">
        <h1>📱 Publiez & Téléchargez des Apps Android</h1>
        <p>Plateforme communautaire de partage d'applications Android.</p>
        <button onclick="ouvrirModal()" style="margin-right:10px;"><i class="fas fa-rocket"></i> Publier mon app</button>
        <button onclick="document.getElementById('catalogue').scrollIntoView({behavior:'smooth'})" style="background:transparent;border:2px solid #00e676;color:#00e676;"><i class="fas fa-compass"></i> Explorer</button>
    </div>

    <div id="catalogue" style="max-width:1000px;margin:50px auto;padding:20px;">
        <h2 style="text-align:center;margin-bottom:30px;color:white;">📱 Catalogue</h2>
        <div id="appGrid" style="text-align:center;color:#6b7280;padding:50px;border:2px dashed #1f2937;border-radius:16px;">
            <i class="fab fa-android" style="font-size:50px;color:#00e676;margin-bottom:20px;display:block;"></i>
            Aucune application pour le moment.
        </div>
    </div>

    <div class="footer"><p>© 2024 OpenStore</p></div>

    <div class="modal" id="maModal">
        <div class="modal-box">
            <h2>📤 Publier une application</h2>
            <input type="text" id="appName" placeholder="Nom de l'application">
            <input type="text" id="developer" placeholder="Développeur">
            <input type="text" id="version" placeholder="Version (ex: 1.0.0)">
            <textarea id="description" placeholder="Description..."></textarea>
            <div class="upload-area" onclick="document.getElementById('apkFile').click()">
                <i class="fas fa-cloud-upload-alt"></i>
                <p>Cliquez pour sélectionner un APK</p>
                <input type="file" id="apkFile" accept=".apk" style="display:none;">
            </div>
            <div class="modal-buttons">
                <button class="btn-cancel" onclick="fermerModal()">Annuler</button>
                <button onclick="publier()">Publier</button>
            </div>
        </div>
    </div>

    <div id="toastContainer"></div>

    <script>
        function ouvrirModal(){document.getElementById('maModal').classList.add('show')}
        function fermerModal(){document.getElementById('maModal').classList.remove('show')}
        function afficherToast(m){var t=document.createElement('div');t.className='toast';t.textContent='✅ '+m;document.getElementById('toastContainer').appendChild(t);setTimeout(function(){t.remove()},3000)}
        function publier(){
            var n=document.getElementById('appName').value.trim();
            var d=document.getElementById('developer').value.trim();
            var v=document.getElementById('version').value.trim();
            var desc=document.getElementById('description').value.trim();
            var f=document.getElementById('apkFile').files[0];
            if(!n||!d||!v||!desc||!f){alert('Remplissez tous les champs');return}
            afficherToast('Application "'+n+'" publiée !');
            fermerModal();
            document.getElementById('appGrid').innerHTML='<div style="background:#111827;border:1px solid #1f2937;border-radius:16px;padding:20px;text-align:left;margin-bottom:10px;"><div style="display:flex;align-items:center;gap:10px;"><i class="fab fa-android" style="font-size:30px;color:#00e676;"></i><div><strong>'+n+'</strong><div style="color:#6b7280;font-size:14px;">par '+d+'</div></div></div><p style="color:#9ca3af;font-size:14px;margin-top:10px;">'+desc+'</p><div style="color:#00e676;font-size:13px;margin-top:10px;">v'+v+'</div></div>'+document.getElementById('appGrid').innerHTML;
        }
        document.getElementById('maModal').addEventListener('click',function(e){if(e.target===this)fermerModal()})
        document.addEventListener('keydown',function(e){if(e.key==='Escape')fermerModal()})
    </script>
</body>
</html>
