<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenStore</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:Arial,sans-serif;background:#070a13;color:#e0e0e0;min-height:100vh}
        .header{background:#111827;padding:15px;display:flex;justify-content:space-between;align-items:center}
        .logo{color:#fff;font-size:20px;font-weight:bold}.logo i{color:#00e676}
        button{background:#00e676;color:#000;border:none;padding:10px 20px;border-radius:50px;font-weight:bold;cursor:pointer;font-size:14px}button:hover{background:#00ff84}
        .container{max-width:1000px;margin:0 auto;padding:15px}
        .grid{display:grid;grid-template-columns:1fr;gap:12px}@media(min-width:600px){.grid{grid-template-columns:1fr 1fr}}@media(min-width:900px){.grid{grid-template-columns:1fr 1fr 1fr}}
        .card{background:#111827;border:1px solid #1f2937;border-radius:14px;padding:18px}
        .card h3{color:#fff;margin-bottom:5px}
        .card p{color:#9ca3af;font-size:13px;margin:8px 0}
        .btn-download{display:block;width:100%;padding:14px;background:#00e676;color:#000;border:none;border-radius:12px;font-size:15px;font-weight:bold;cursor:pointer;text-align:center;text-decoration:none;margin:10px 0}
        .modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.9);z-index:999;align-items:center;justify-content:center;padding:15px}.modal.show{display:flex}
        .modal-box{background:#111827;padding:20px;border-radius:16px;width:100%;max-width:450px;border:1px solid #1f2937}
        .modal-box h2{color:#fff;margin-bottom:15px}
        .modal-box input,.modal-box textarea{width:100%;padding:10px;margin-bottom:10px;background:#070a13;border:1px solid #1f2937;border-radius:10px;color:#fff;font-size:13px}
        .upload-area{border:2px dashed #1f2937;padding:20px;text-align:center;border-radius:10px;margin-bottom:10px;cursor:pointer;background:#070a13}.upload-area:hover{border-color:#00e676}
        .toast{position:fixed;top:15px;right:15px;background:#111827;border-left:3px solid #00e676;padding:12px;border-radius:10px;z-index:9999;font-size:13px;animation:slide 0.3s ease}@keyframes slide{from{transform:translateX(100%)}to{transform:translateX(0)}}
    </style>
</head>
<body>
<div id="toastContainer" style="position:fixed;top:15px;right:15px;z-index:9999;display:flex;flex-direction:column;gap:8px;"></div>

<header class="header">
    <a href="/" class="logo"><i class="fab fa-android"></i> OpenStore</a>
    <button onclick="ouvrirModal()"><i class="fas fa-upload"></i> Publier</button>
</header>

<div class="container">
    <div style="background:#111827;border:1px solid #1f2937;border-radius:12px;padding:15px;text-align:center;color:#6b7280;margin-bottom:15px;">📢 Publicité Start.io - ID: 204468294</div>
    
    <h1 style="text-align:center;color:#fff;margin:15px 0;">📱 Catalogue</h1>
    <div class="grid" id="appGrid"><p style="color:#9ca3af;text-align:center;">Chargement...</p></div>
    
    <p style="text-align:center;color:#6b7280;margin-top:15px;">📢 Publicité 300x250 - ID: 204468294</p>
</div>

<footer style="text-align:center;padding:15px;color:#6b7280;border-top:1px solid #1f2937;margin-top:20px;font-size:12px;"><p>© 2024 OpenStore</p></footer>

<div class="modal" id="maModal"><div class="modal-box"><h2>📤 Publier</h2>
    <input type="text" id="appName" placeholder="Nom *">
    <input type="text" id="developer" placeholder="Développeur *">
    <input type="text" id="version" placeholder="Version *">
    <textarea id="description" placeholder="Description *" style="min-height:60px;resize:vertical;"></textarea>
    <input type="text" id="appUrl" placeholder="Lien de téléchargement (URL directe APK) *">
    <p style="color:#9ca3af;font-size:11px;margin-bottom:10px;">Ex: https://github.com/.../monapp.apk</p>
    <div style="display:flex;gap:8px;justify-content:flex-end;">
        <button style="background:transparent;border:1px solid #1f2937;color:#9ca3af;" onclick="fermerModal()">Annuler</button>
        <button onclick="publier()">📤 Publier</button>
    </div>
</div></div>

<script>
const DB_URL = "https://openstore-22f32-default-rtdb.firebaseio.com/apps.json";
let apps = [];
let telechargements = JSON.parse(localStorage.getItem('dl') || '{}');

async function loadApps() {
    try { let r=await fetch(DB_URL); apps=(await r.json())||[]; if(apps.length===0) apps=JSON.parse(localStorage.getItem('apps')||'[]'); }
    catch(e) { apps=JSON.parse(localStorage.getItem('apps')||'[]'); }
    afficher();
}

function afficher() {
    let g=document.getElementById('appGrid');
    if(apps.length===0){ g.innerHTML='<p style="color:#9ca3af;text-align:center;">Aucune app. Publiez la première !</p>'; return; }
    
    g.innerHTML=apps.map(function(a){
        let dl=telechargements[a.id]||0;
        let url=a.url||'';
        let isReal=url.startsWith('http://')||url.startsWith('https://');
        
        return '<div class="card">'+
            '<h3>'+(a.nom||'Sans nom')+'</h3>'+
            '<p>Par '+(a.dev||'Inconnu')+' | v'+(a.ver||'1.0')+'</p>'+
            '<p>'+(a.desc||'')+'</p>'+
            '<p style="color:#00e676;font-size:11px;">📥 '+dl+' téléchargements</p>'+
            (isReal?
                '<a href="'+url+'" class="btn-download" target="_blank" rel="noopener noreferrer" onclick="compterDL('+a.id+',\''+(a.nom||'App')+'\')"><i class="fas fa-download"></i> TÉLÉCHARGER</a>':
                '<button class="btn-download" onclick="compterDL('+a.id+',\''+(a.nom||'App')+'\')"><i class="fas fa-download"></i> TÉLÉCHARGER (SIMULATION)</button>')+
        '</div>';
    }).join('');
}

function compterDL(id,nom){ telechargements[id]=(telechargements[id]||0)+1; localStorage.setItem('dl',JSON.stringify(telechargements)); toast('📥 '+nom+' téléchargé !'); setTimeout(function(){ afficher(); },500); }

function publier(){
    let n=document.getElementById('appName').value.trim();
    let d=document.getElementById('developer').value.trim();
    let v=document.getElementById('version').value.trim();
    let desc=document.getElementById('description').value.trim();
    let url=document.getElementById('appUrl').value.trim();
    
    if(!n||!d||!v||!desc){ toast('Remplissez tous les champs'); return; }
    if(!url){ toast('Ajoutez un lien de téléchargement'); return; }
    
    let existants=apps.filter(function(a){ return (a.nom||'').toLowerCase()===n.toLowerCase()&&(a.dev||'').toLowerCase()===d.toLowerCase(); });
    existants.forEach(function(o){ let i=apps.findIndex(function(a){ return a.id===o.id; }); if(i>-1) apps.splice(i,1); });
    
    apps.unshift({ id:Date.now(), nom:n, dev:d, ver:v, desc:desc, url:url, date:new Date().toISOString() });
    localStorage.setItem('apps',JSON.stringify(apps));
    fetch(DB_URL,{ method:'PUT',body:JSON.stringify(apps) }).catch(function(){});
    
    toast('✅ '+n+' publiée !');
    fermerModal();
    afficher();
}

function ouvrirModal(){ document.getElementById('maModal').classList.add('show'); }
function fermerModal(){ document.getElementById('maModal').classList.remove('show'); }
function toast(m){ let d=document.createElement('div'); d.className='toast'; d.textContent=m; document.getElementById('toastContainer').appendChild(d); setTimeout(function(){ d.remove(); },3000); }

document.getElementById('maModal').onclick=function(e){ if(e.target===this) fermerModal(); };
document.addEventListener('keydown',function(e){ if(e.key==='Escape') fermerModal(); });

loadApps();
console.log('✅ Prêt');
</script>
</body>
</html>
